name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: trading_bot
          POSTGRES_PASSWORD: trading_bot_secret
          POSTGRES_DB: trading_bot
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U trading_bot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Go module cache
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go-bot/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Run tests
        working-directory: go-bot
        run: go test ./... -count=1 -short -race -timeout 5m
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: trading_bot
          DATABASE_PASSWORD: trading_bot_secret
          DATABASE_NAME: trading_bot
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Build
        working-directory: go-bot
        run: go build -o /dev/null ./cmd/bot

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-engine/Cargo.lock') }}

      - name: Run tests
        working-directory: rust-engine
        run: cargo test --release

      - name: Build
        working-directory: rust-engine
        run: cargo build --release

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ml-service
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ml-service
        run: python -m pytest tests/ -v

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [go-test, rust-test, python-test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Go Bot
        uses: docker/build-push-action@v5
        with:
          context: ./go-bot
          file: ./go-bot/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/go-bot:${{ github.sha }}
            ghcr.io/${{ github.repository }}/go-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Rust Engine
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./rust-engine/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/rust-engine:${{ github.sha }}
            ghcr.io/${{ github.repository }}/rust-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push ML Service
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          file: ./ml-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ml-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/ml-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: go-bot
          args: --timeout=5m
