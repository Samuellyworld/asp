services:
  # postgresql with timescaledb extension for time-series data
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: trading-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_bot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-trading_bot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading_bot} -d ${POSTGRES_DB:-trading_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading-bot-network

  # redis for caching, rate limiting, and pub/sub
  redis:
    image: redis:7-alpine
    container_name: trading-bot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading-bot-network

  # go bot - main orchestrator
  go-bot:
    build:
      context: ./go-bot
      dockerfile: Dockerfile
    container_name: trading-bot-go
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rust-engine:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-trading_bot}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-trading_bot_secret}
      - DATABASE_NAME=${POSTGRES_DB:-trading_bot}
      - DATABASE_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secret}
      - SECURITY_MASTER_KEY=${SECURITY_MASTER_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID:-0}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_APPLICATION_ID=${DISCORD_APPLICATION_ID}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      - CLAUDE_MAX_TOKENS=${CLAUDE_MAX_TOKENS:-4096}
      - BINANCE_TESTNET=${BINANCE_TESTNET:-true}
      - BINANCE_TESTNET_API_URL=https://testnet.binance.vision
      - BINANCE_TESTNET_WS_URL=wss://testnet.binance.vision/ws
      - BINANCE_MAINNET_API_URL=https://api.binance.com
      - BINANCE_MAINNET_WS_URL=wss://stream.binance.com:9443/ws
      - BINANCE_FUTURES_TESTNET_API_URL=https://testnet.binancefuture.com
      - BINANCE_FUTURES_MAINNET_API_URL=https://fapi.binance.com
      - BYBIT_TESTNET=${BYBIT_TESTNET:-true}
      - BYBIT_TESTNET_API_URL=https://api-testnet.bybit.com
      - BYBIT_MAINNET_API_URL=https://api.bybit.com
      - RUST_ENGINE_ADDRESS=rust-engine:50051
      - ML_SERVICE_BASE_URL=http://ml-service:8000
      - DATASOURCES_CRYPTOPANIC_TOKEN=${DATASOURCES_CRYPTOPANIC_TOKEN}
      - DATASOURCES_COINGLASS_API_KEY=${DATASOURCES_COINGLASS_API_KEY}
      - DATASOURCES_COINGECKO_API_KEY=${DATASOURCES_COINGECKO_API_KEY}
      - API_ENABLED=${API_ENABLED:-true}
      - API_KEY=${API_KEY}
      - TRADING_DEFAULT_CONFIDENCE_THRESHOLD=${TRADING_DEFAULT_CONFIDENCE_THRESHOLD:-80}
      - TRADING_TIMEFRAMES=${TRADING_TIMEFRAMES:-4h,1d}
      - TRADING_DRIFT_CHECK_INTERVAL_MINUTES=${TRADING_DRIFT_CHECK_INTERVAL_MINUTES:-60}
      - LEVERAGE_HARD_MAX_LEVERAGE=${LEVERAGE_HARD_MAX_LEVERAGE:-20}
      - LEVERAGE_MAX_MARGIN_PER_TRADE=${LEVERAGE_MAX_MARGIN_PER_TRADE:-500}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "${GO_BOT_PORT:-8080}:8080"
    volumes:
      - ./migrations:/app/root-migrations:ro
      - ./go-bot/migrations:/app/migrations:ro
    networks:
      - trading-bot-network

  # rust engine - technical indicators via grpc
  rust-engine:
    build:
      context: .
      dockerfile: rust-engine/Dockerfile
    container_name: trading-bot-rust
    restart: unless-stopped
    environment:
      - RUST_LOG=${RUST_LOG:-info}
    ports:
      - "${RUST_GRPC_PORT:-50051}:50051"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 50051 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - trading-bot-network

  # python ml service - lstm predictions + sentiment
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: trading-bot-ml
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/app/models
    ports:
      - "${ML_SERVICE_PORT:-8000}:8000"
    volumes:
      - ml_models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - trading-bot-network

  # prometheus - metrics collection
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: trading-bot-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - trading-bot-network

  # grafana - dashboards and visualization
  grafana:
    image: grafana/grafana:11.1.0
    container_name: trading-bot-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - trading-bot-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ml_models:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  trading-bot-network:
    driver: bridge
